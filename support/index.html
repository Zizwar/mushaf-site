<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushaf Mauri - المصحف الموري</title>
    <meta name="description" content="مصحف موري - القرآن الكريم - ورش | Mushaf Mauri - The Holy Quran - Warsh">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --primary: #357fef;
            --primary-dark: #2563c7;
            --secondary: #4e4e4e;
            --accent: #13B8EA;
            --accent2: #4E56F3;
            --bg: #ffffff;
            --bg-alt: #f8f9ff;
            --bg-dark-section: linear-gradient(135deg, #1a1f4e 0%, #0d1033 100%);
            --text: #333333;
            --text-muted: #6b7280;
            --text-light: #ffffff;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 24px rgba(0,0,0,0.08);
            --card-hover-shadow: 0 8px 40px rgba(53,127,239,0.15);
            --border: #e5e7eb;
            --nav-bg: rgba(255,255,255,0.95);
            --hero-gradient: linear-gradient(135deg, #0d1033 0%, #1a1f4e 50%, #2a2f6e 100%);
            --screenshot-bg: linear-gradient(135deg, #1a1f4e 0%, #0d1033 100%);
            --footer-bg: #0d1033;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-alt: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --card-shadow: 0 4px 24px rgba(0,0,0,0.3);
            --card-hover-shadow: 0 8px 40px rgba(53,127,239,0.25);
            --border: #334155;
            --nav-bg: rgba(15,23,42,0.95);
            --hero-gradient: linear-gradient(135deg, #050816 0%, #0f172a 50%, #1a1f4e 100%);
            --screenshot-bg: linear-gradient(135deg, #050816 0%, #0f172a 100%);
            --footer-bg: #050816;
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Kufi Arabic', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        [dir="ltr"] body {
            font-family: 'Inter', 'Noto Kufi Arabic', sans-serif;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== Navigation ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
            padding: 0 24px;
        }

        .navbar.scrolled {
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand .brand-icon {
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color var(--transition);
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all var(--transition);
        }

        .nav-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--text);
            transition: all var(--transition);
            border-radius: 2px;
        }

        /* ===== Hero Section ===== */
        .hero {
            min-height: 100vh;
            background: var(--hero-gradient);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding-top: 64px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 200%;
            background: radial-gradient(circle, rgba(53,127,239,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(19,184,234,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            color: var(--text-light);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            backdrop-filter: blur(8px);
        }

        .hero-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
            font-family: 'Amiri', 'Noto Kufi Arabic', serif;
        }

        [dir="ltr"] .hero h1 {
            font-family: 'Inter', sans-serif;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.85;
            margin-bottom: 36px;
            max-width: 480px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(53,127,239,0.35);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn-outline:hover {
            border-color: white;
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .hero-image {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
            max-height: 500px;
            object-fit: cover;
        }

        .hero-image:hover img {
            transform: scale(1.02) rotate(-1deg);
        }

        .hero-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(53,127,239,0.3), transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
        }

        /* Floating decorations */
        .float-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
        }

        .float-circle:nth-child(1) {
            width: 200px;
            height: 200px;
            background: var(--accent);
            top: 10%;
            right: 5%;
            animation-delay: 0s;
        }

        .float-circle:nth-child(2) {
            width: 120px;
            height: 120px;
            background: var(--accent2);
            bottom: 20%;
            left: 5%;
            animation-delay: 2s;
        }

        .float-circle:nth-child(3) {
            width: 80px;
            height: 80px;
            background: var(--primary);
            top: 30%;
            left: 15%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* ===== Section Styles ===== */
        .section {
            padding: 100px 0;
        }

        .section-header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 60px;
        }

        .section-header h2 {
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }

        .section-header p {
            font-size: 1.05rem;
            color: var(--text-muted);
        }

        .section-dark .section-header h2,
        .section-dark .section-header p {
            color: var(--text-light);
        }

        .section-dark .section-header p {
            opacity: 0.8;
        }

        /* ===== Services Section ===== */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .service-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transition: transform var(--transition);
        }

        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover-shadow);
            border-color: transparent;
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .service-icon img {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }

        .service-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .service-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.7;
        }

        /* ===== Features/About Section ===== */
        .features-section {
            background: var(--bg-dark-section);
            position: relative;
            overflow: hidden;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .features-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .feature-item {
            text-align: center;
            padding: 24px 16px;
            border-radius: 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            transition: all var(--transition);
        }

        .feature-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-4px);
        }

        .feature-item img {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .feature-item h3 {
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 600;
        }

        .features-phone {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .features-phone img {
            max-height: 480px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* ===== Developer Section ===== */
        .dev-section {
            background: var(--bg-alt);
        }

        .dev-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .dev-image img {
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .dev-content h2 {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: 20px;
        }

        .dev-content p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .dev-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .dev-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-weight: 600;
            font-size: 0.95rem;
            transition: all var(--transition);
            color: var(--text);
        }

        .dev-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(53,127,239,0.15);
        }

        .dev-link i {
            font-size: 1.3rem;
        }

        /* ===== Screenshots Section ===== */
        .screenshots-section {
            background: var(--screenshot-bg);
            overflow: hidden;
        }

        .screenshots-track {
            display: flex;
            gap: 20px;
            animation: scroll-rtl 40s linear infinite;
            width: max-content;
        }

        [dir="ltr"] .screenshots-track {
            animation: scroll-ltr 40s linear infinite;
        }

        .screenshots-track:hover {
            animation-play-state: paused;
        }

        .screenshot-item {
            flex-shrink: 0;
            width: 240px;
            border-radius: 16px;
            overflow: hidden;
            transition: transform var(--transition);
        }

        .screenshot-item:hover {
            transform: scale(1.05);
        }

        .screenshot-item img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            border-radius: 16px;
        }

        @keyframes scroll-rtl {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        @keyframes scroll-ltr {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ===== Footer ===== */
        .footer {
            background: var(--footer-bg);
            padding: 60px 0 30px;
            color: var(--text-light);
        }

        .footer-content {
            text-align: center;
        }

        .footer h3 {
            font-size: 1.4rem;
            margin-bottom: 24px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
            list-style: none;
        }

        .social-links a {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-light);
            transition: all var(--transition);
        }

        .social-links a:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 24px;
            text-align: center;
            opacity: 0.6;
            font-size: 0.85rem;
        }

        /* ===== Scroll Animations ===== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== Responsive ===== */
        @media (max-width: 992px) {
            .hero .container {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 40px;
            }

            .hero p {
                margin-left: auto;
                margin-right: auto;
            }

            .hero-buttons {
                justify-content: center;
            }

            .hero-image img {
